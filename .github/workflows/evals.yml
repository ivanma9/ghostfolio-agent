name: Golden-Set Evals

on:
  schedule:
    - cron: '0 7 */2 * *'  # Every 2 days at 7am UTC
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GHOSTFOLIO_BASE_URL: ${{ secrets.GHOSTFOLIO_BASE_URL }}
      GHOSTFOLIO_ACCESS_TOKEN: ${{ secrets.GHOSTFOLIO_ACCESS_TOKEN }}
      AGENT_PORT: 8000

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Start agent server
        run: |
          uv run uvicorn ghostfolio_agent.main:app --host 0.0.0.0 --port 8000 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s --max-time 2 http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run golden-set evals
        run: uv run python tests/eval/run_evals.py --url http://localhost:8000 --junit-xml results/golden-set.xml

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Golden-Set Eval Results
          path: results/golden-set.xml
          reporter: java-junit
