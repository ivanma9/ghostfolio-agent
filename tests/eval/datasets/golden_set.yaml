# Stage 1: Golden Set — deterministic baseline correctness checks
# Run on every meaningful change. All checks are against tool outputs only.

- id: tc_001_portfolio_overview
  input: "What's in my portfolio?"
  expected_tools: [portfolio_summary]
  expected_tool_output_contains: [AAPL, MSFT, GOOGL, VTI, AMZN]
  expected_output_contains: []
  expected_output_not_contains: []
  category: portfolio
  complexity: single_tool
  difficulty: straightforward
  stage: golden_set
  description: Basic portfolio overview should list all holdings by calling portfolio_summary tool

