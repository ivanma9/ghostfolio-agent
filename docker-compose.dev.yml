version: "3.9"

# Development compose file — runs Ghostfolio + its dependencies locally.
# The agent itself runs on the host (not in Docker) and calls Ghostfolio at
# http://localhost:3333.  Start with:
#   docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ghostfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ghostfolio-db
      POSTGRES_USER: ghostfolio
      POSTGRES_PASSWORD: ghostfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostfolio -d ghostfolio-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:alpine
    container_name: ghostfolio-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "ghostfolio"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ghostfolio", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ghostfolio:
    image: ghostfolio/ghostfolio:latest
    container_name: ghostfolio-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      # Prisma / PostgreSQL
      DATABASE_URL: "postgresql://ghostfolio:ghostfolio@postgres:5432/ghostfolio-db?sslmode=prefer"

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ghostfolio

      # Security — dev-only placeholder values, never use these in production
      ACCESS_TOKEN_SALT: "dev-access-token-salt-change-in-prod-32chars"
      JWT_SECRET_KEY: "dev-jwt-secret-key-change-in-prod-32chars!"
      SECRET: "dev-secret-change-in-production-32chars!!"

      NODE_ENV: development
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3333/api/v1/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
    name: ghostfolio_postgres_data
